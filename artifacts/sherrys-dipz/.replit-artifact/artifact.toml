kind = "web"
previewPath = "/"
title = "Sherry's Dipz"
version = "1.0.0"
id = "artifacts/sherrys-dipz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22567

[services.development]
run = "pnpm --filter @workspace/sherrys-dipz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sherrys-dipz", "run", "build" ]
publicDir = "artifacts/sherrys-dipz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22567"
BASE_PATH = "/"
