[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server build"

[build.env]
NIXPACKS_INSTALL_CMD = "pnpm install --no-frozen-lockfile"

[deploy]
startCommand = "PORT=8080 ADMIN_EMAIL=sherrysdipz@gmail.com pnpm --filter @workspace/api-server start"

[deploy.healthcheck]
path = "/api/healthz"
